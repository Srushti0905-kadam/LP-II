<div class="container mt-5">
  <h2 class="text-center">Register</h2>

  <form (ngSubmit)="registerUser()" class="card p-4">
    <input class="form-control mb-2" [(ngModel)]="user.name" name="name" placeholder="Name" required>
    <input class="form-control mb-2" [(ngModel)]="user.email" name="email" placeholder="Email" required>
    <input class="form-control mb-2" [(ngModel)]="user.password" name="password" type="password" placeholder="Password" required>

    <button class="btn btn-success">Register</button>
  </form>

  <div class="text-center mt-2">
    <a routerLink="/login">Go to Login</a>
  </div>
</div>
