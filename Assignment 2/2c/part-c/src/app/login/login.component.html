<div class="container mt-5">
  <h2 class="text-center">Login</h2>

  <form (ngSubmit)="loginUser()" class="card p-4">
    <input class="form-control mb-2" [(ngModel)]="email" name="email" placeholder="Email" required>
    <input class="form-control mb-2" [(ngModel)]="password" name="password" type="password" placeholder="Password" required>

    <button class="btn btn-primary">Login</button>
  </form>
</div>
