<div class="container mt-5">
  <h2 class="text-center">User Profile</h2>

  <div class="card p-4" *ngIf="user; else noData">
    <p><b>Name:</b> {{ user.name }}</p>
    <p><b>Email:</b> {{ user.email }}</p>
  </div>

  <ng-template #noData>
    <p class="text-center">No user data found.</p>
  </ng-template>
</div>
