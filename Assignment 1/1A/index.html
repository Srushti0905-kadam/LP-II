<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

   
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="d-flex">

   
    <div class="sidebar">
        <h4 class="text-white text-center py-3">Dashboard</h4>
        <ul class="nav flex-column px-3">
            <li class="nav-item"><a href="#" class="nav-link">Home</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Orders</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Products</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Users</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Reports</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Settings</a></li>
        </ul>
    </div>

   
    <div class="content p-4 w-100">

        <h3>Admin Panel</h3>

      
        <div class="row my-4">
            <div class="col-md-3">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h5>Total Orders</h5>
                        <h3>120</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h5>Total Revenue</h5>
                        <h3>₹50,000</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-dark bg-warning">
                    <div class="card-body">
                        <h5>Users</h5>
                        <h3>300</h3>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card text-white bg-danger">
                    <div class="card-body">
                        <h5>Products</h5>
                        <h3>80</h3>
                    </div>
                </div>
            </div>
        </div>

        
        <div class="card">
            <div class="card-header">
                Recent Orders
            </div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Status</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>#101</td>
                            <td>John</td>
                            <td>Completed</td>
                            <td>₹500</td>
                        </tr>
                        <tr>
                            <td>#102</td>
                            <td>Emma</td>
                            <td>Pending</td>
                            <td>₹800</td>
                        </tr>
                        <tr>
                            <td>#103</td>
                            <td>Raj</td>
                            <td>Cancelled</td>
                            <td>₹300</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

</body>
</html>
