<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="text-center mb-4">User Registration</h2>

    <form id="regForm" class="card p-4 shadow">
        <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name" required>
        <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email" required>
        <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password" required>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <div class="text-center mt-3">
        <a href="data.html">View Registered Users</a>
    </div>
</div>

<!-- External JS -->
<script src="script.js"></script>

</body>
</html>
